<svg width="680" height="160" viewBox="0 0 680 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="100%" stop-color="#0D0D22"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#534AB7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#534AB7" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3C8CDD" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3C8CDD" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1D9D74" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1D9D74" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#534AB7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#534AB7" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="bar5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1D9D74" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1D9D74" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#534AB7"/>
      <stop offset="50%" stop-color="#3C8CDD"/>
      <stop offset="100%" stop-color="#1D9D74"/>
    </linearGradient>
    <linearGradient id="titlegrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C8C4FF"/>
      <stop offset="60%" stop-color="#EEEEFF"/>
      <stop offset="100%" stop-color="#7EECD4"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="680" height="160" rx="14"/>
    </clipPath>
  </defs>

  <rect width="680" height="160" rx="14" fill="url(#bg)"/>

  <!-- subtle grid lines -->
  <g clip-path="url(#clip)" opacity="0.06" stroke="#8888BB" stroke-width="0.5" fill="none">
    <line x1="0" y1="40" x2="680" y2="40"/>
    <line x1="0" y1="80" x2="680" y2="80"/>
    <line x1="0" y1="120" x2="680" y2="120"/>
    <line x1="120" y1="0" x2="120" y2="160"/>
    <line x1="240" y1="0" x2="240" y2="160"/>
    <line x1="360" y1="0" x2="360" y2="160"/>
    <line x1="480" y1="0" x2="480" y2="160"/>
    <line x1="600" y1="0" x2="600" y2="160"/>
  </g>

  <!-- normal curve sketch (right side) -->
  <g clip-path="url(#clip)" opacity="0.18" fill="none" stroke="#534AB7" stroke-width="1.5">
    <path d="M 540 130 Q 560 130 575 110 Q 585 95 590 75 Q 595 55 600 45 Q 610 28 620 40 Q 630 55 635 75 Q 640 95 645 110 Q 655 130 670 130"/>
  </g>
  <g clip-path="url(#clip)" opacity="0.08" fill="#534AB7">
    <path d="M 540 130 Q 560 130 575 110 Q 585 95 590 75 Q 595 55 600 45 Q 610 28 620 40 Q 630 55 635 75 Q 640 95 645 110 Q 655 130 670 130 L 670 160 L 540 160 Z"/>
  </g>

  <!-- bar chart (left side) -->
  <g clip-path="url(#clip)">
    <rect x="18" y="95" width="14" height="55" rx="2" fill="url(#bar4)" opacity="0.5"/>
    <rect x="36" y="75" width="14" height="75" rx="2" fill="url(#bar1)" opacity="0.6"/>
    <rect x="54" y="55" width="14" height="95" rx="2" fill="url(#bar2)" opacity="0.6"/>
    <rect x="72" y="70" width="14" height="80" rx="2" fill="url(#bar3)" opacity="0.6"/>
    <rect x="90" y="85" width="14" height="65" rx="2" fill="url(#bar5)" opacity="0.5"/>
  </g>

  <!-- scatter dots + regression line (top right) -->
  <g clip-path="url(#clip)" opacity="0.25">
    <circle cx="560" cy="25" r="2.5" fill="#534AB7"/>
    <circle cx="575" cy="18" r="2" fill="#3C8CDD"/>
    <circle cx="590" cy="22" r="2.5" fill="#1D9D74"/>
    <circle cx="605" cy="14" r="2" fill="#534AB7"/>
    <circle cx="618" cy="20" r="3" fill="#3C8CDD"/>
    <circle cx="632" cy="12" r="2" fill="#1D9D74"/>
    <circle cx="645" cy="17" r="2.5" fill="#534AB7"/>
    <circle cx="658" cy="10" r="2" fill="#3C8CDD"/>
    <line x1="555" y1="28" x2="665" y2="7" stroke="#8888BB" stroke-width="0.8" stroke-dasharray="3 2"/>
  </g>

  <!-- title -->
  <text x="340" y="80"
    font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
    font-size="46" font-weight="700" fill="url(#titlegrad)"
    text-anchor="middle" letter-spacing="6">STATANIM</text>

  <!-- accent dots -->
  <circle cx="268" cy="102" r="1.5" fill="#534AB7" opacity="0.7"/>
  <circle cx="276" cy="102" r="1.5" fill="#3C8CDD" opacity="0.7"/>
  <circle cx="284" cy="102" r="1.5" fill="#1D9D74" opacity="0.7"/>

  <!-- subtitle -->
  <text x="340" y="123"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="13" fill="#7777AA"
    text-anchor="middle" letter-spacing="2.5">STATISTICAL ANIMATION FOR MANIM</text>

  <!-- bottom accent bar -->
  <rect x="0" y="154" width="680" height="4" fill="url(#accent)"/>
  <!-- corner marks -->
  <rect x="0" y="0" width="4" height="30" fill="#534AB7" opacity="0.5"/>
  <rect x="0" y="0" width="30" height="4" fill="#534AB7" opacity="0.5"/>
  <rect x="676" y="0" width="4" height="30" fill="#1D9D74" opacity="0.5"/>
  <rect x="650" y="0" width="30" height="4" fill="#1D9D74" opacity="0.5"/>
</svg>
